<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 64) rotate(90) scale(54)">
      <stop offset="0" stop-color="#E9F2FF" stop-opacity="0.88"/>
      <stop offset="0.42" stop-color="#CBD7FF" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#9FA8E8" stop-opacity="0.36"/>
    </radialGradient>
    <radialGradient id="orbFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 66) rotate(90) scale(18)">
      <stop offset="0" stop-color="#8BF6FF"/>
      <stop offset="0.54" stop-color="#66D6FF"/>
      <stop offset="1" stop-color="#7A84FF"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(61 59) rotate(90) scale(11)">
      <stop offset="0" stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="10" y="10" width="108" height="108" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="orbBlur" x="32" y="34" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="#141C34"/>
  <circle cx="64" cy="64" r="38" fill="url(#bgGlow)"/>
  <circle cx="64" cy="64" r="44" stroke="rgba(198,214,255,0.34)" stroke-width="1.2"/>

  <g filter="url(#softBlur)">
    <circle cx="64" cy="64" r="28" fill="#C7D5FF" fill-opacity="0.34"/>
  </g>

  <g filter="url(#orbBlur)">
    <circle cx="64" cy="66" r="15" fill="#76DFFF" fill-opacity="0.42"/>
  </g>

  <circle cx="64" cy="66" r="14" fill="url(#orbFill)"/>
  <circle cx="61" cy="59" r="10" fill="url(#innerGlow)"/>
</svg>
